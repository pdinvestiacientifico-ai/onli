<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Salud - Centro El Progreso</title>
    <style>
        :root { --primary: #2d827f; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #333; line-height: 1.6; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; }
        .intro { font-size: 0.95em; color: #666; margin-bottom: 20px; border-left: 4px solid var(--primary); padding-left: 15px; }
        .section-title { color: var(--primary); margin-top: 30px; font-size: 1.2em; border-bottom: 2px solid var(--bg); }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-size: 18px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #236664; }
    </style>
</head>
<body>

<div class="container">
    <h1>Cuestionario de Salud</h1>
    <div class="intro">
        <p>Su participación es voluntaria y anónima[cite: 5]. Ayúdenos a mejorar la atención del Centro de Salud Materno Infantil El Progreso[cite: 2].</p>
    </div>

    <form id="formEncuesta">
        <div class="section-title">I. Ficha Sociodemográfica [cite: 8]</div>
        <div class="form-group"><input type="number" name="edad" placeholder="Edad (años)" required></div>
        <div class="form-group">
            <select name="sexo">
                <option value="">Seleccione Sexo</option>
                <option value="Masculino">Masculino</option>
                <option value="Femenino">Femenino</option>
            </select>
        </div>

        <div class="section-title">II. Factores Terapéuticos [cite: 18]</div>
        <p style="font-size: 0.8em;">(Escala: 1=Nunca, 5=Siempre) [cite: 20]</p>
        <div class="form-group">
            <label>1. ¿Los efectos secundarios le generan molestias?</label>
            <input type="number" name="f1" min="1" max="5" placeholder="1-5">
        </div>

        <button type="submit" id="btnEnviar">Enviar mis respuestas</button>
    </form>
</div>

<script>
    const urlExcel = "https://script.google.com/macros/s/AKfycbzsG-1U9NxAxYec5TIO-aQYxoRq6plU4VK0xPC2Ak33AQelbwhlUIzP_xHB72Rwaobg/exec";

    document.getElementById('formEncuesta').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.innerText = "Enviando...";
        
        fetch(urlExcel, { method: 'POST', body: new FormData(this) })
        .then(() => {
            alert("¡Gracias por su valiosa información!");
            this.reset();
            btn.innerText = "Enviar mis respuestas";
        });
    });
</script>
</body>
</html>
